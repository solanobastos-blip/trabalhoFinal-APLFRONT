<form [formGroup]="formTeste" class="form">
  <div class="form-group">
    <label for="name">Nome</label>
    
    <input id="name" formControlName="name" type="text" class="form-control" />
     @if (formTeste.get('name')?.invalid && formTeste.get('name')?.touched) {
      <small style="color: red; text-align: left;">
        Por favor, insira um nome válido.
      </small>
    }
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" formControlName="email" type="email" class="form-control" />
  </div>
  <button type="button" (click)="submitForm()" [disabled]="formTeste.invalid" class="btn btn-primary">Enviar</button>
</form>


<div style="margin-top: 30px; background-color: #eee; padding: 15px;">
    <h4>Value do Formulário (JSON):</h4>
    <pre>{{ formTeste.value | json }}</pre>
  </div>
